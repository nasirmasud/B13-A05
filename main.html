<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- DaisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <header
      class="navbar bg-white px-20 py-3 flex justify-between items-center shadow-md"
    >
      <div class="flex items-center gap-2">
        <img src="./assets/github-logo.png" alt="Github Logo" class="w-7 h-7" />
        <span class="font-bold text-xl text-gray-800"
          >GitHub Issue Tracker</span
        >
      </div>

      <div class="flex items-center gap-3">
        <div class="relative w-64">
          <span
            class="absolute top-1 bottom-0 left-0 items-center pl-3 h-9 w-9 z-10"
            ><i class="fa-solid fa-magnifying-glass text-gray-400"></i
          ></span>
          <input
            id="search-input"
            type="text"
            placeholder="Search issues..."
            class="input input-sm h-8 w-48 md:w-64 pl-10 bg-gray-50 border-gray-200 rounded-md focus:outline-none focus:border-indigo-500 focus:bg-white"
          />
        </div>
        <button
          class="btn btn-sm bg-indigo-600 hover:bg-indigo-700 text-white border-none rounded-md normal-case mt-0"
        >
          <i class="fa-solid fa-plus text-xs mr-1"></i> New Issue
        </button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
      <div class="flex justify-center md:justify-start mb-6">
        <div class="join bg-white rounded-lg">
          <button
            id="all-issue-tab"
            class="btn join-item btn-sm px-8 bg-indigo-600 text-white border-none"
          >
            All
          </button>
          <button
            id="open-issue-tab"
            class="btn join-item btn-sm px-8 bg-white border-none"
          >
            Open
          </button>
          <button
            id="closed-issue-tab"
            class="btn join-item btn-sm px-8 bg-white border-none"
          >
            Closed
          </button>
        </div>
      </div>

      <div
        class="bg-white rounded-xl p-5 mb-8 flex flex-col md:flex-row justify-between items-center shadow-sm"
      >
        <div class="flex items-center gap-4">
          <div class="bg-indigo-100 p-3 rounded-full">
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 id="total-issue-count" class="text-xl font-bold text-gray-800">
              50 Issues
            </h2>
            <p class="text-sm text-gray-500">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex gap-6 mt-4 md:mt-0">
          <span class="flex items-center gap-2 text-sm font-medium"
            ><span class="w-3 h-3 rounded-full bg-emerald-500"></span>
            Open</span
          >
          <span class="flex items-center gap-2 text-sm font-medium"
            ><span class="w-3 h-3 rounded-full bg-indigo-500"></span>
            Closed</span
          >
        </div>
      </div>

      <!-- Issue Container -->
      <div
        id="issue-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>

      <!-- Loading Spinner -->
      <div id="loading" class="hidden flex justify-center py-20">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
    </main>

    <script src="./mainScript.js"></script>
  </body>
</html>
