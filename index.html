<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- DaisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Github Issue Tracker</title>
  </head>
  <body>
    <div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
      <div
        class="bg-white p-8 rounded-lg shadow-2xl border border-gray-100 w-full max-w-md"
      >
        <div class="text-center mb-8">
          <div class="flex justify-center mb-4">
            <img
              class="w-16 h-16"
              src="./assets/github-logo.png"
              alt="GitHub logo"
            />
          </div>
          <h1 class="text-gray-800 text-2xl font-bold">GitHub Issue Tracker</h1>
          <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <div class="space-y-4">
          <div class="form-control">
            <label class="label p-1" for="">
              <div class="label-text font-semibold">UserName</div>
            </label>
            <input
              id="username"
              class="input input-bordered w-full focus:outline-none focus:border-blue-500"
              type="text"
              placeholder="Enter UserName"
            />
            <label class="label p-1" for="">
              <span class="label-text-alt text-blue-600">Default: admin</span>
            </label>
          </div>

          <div class="form-control">
            <label class="label p-1" for="">
              <span class="label-text font-semibold">Password</span>
            </label>
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              class="input input-bordered w-full focus:outline-none focus:border-blue-500"
            />
            <label class="label p-1">
              <span class="label-text-alt text-blue-600"
                >Default: admin123</span
              >
            </label>
          </div>

          <button
            id="login-btn"
            class="btn btn-primary w-full bg-indigo-600 border-none hover:bg-indigo-700 normal-case text-lg"
          >
            Sign In
          </button>
        </div>

        <div class="divider text-gray-400 text-sm my-6">OR</div>

        <div class="bg-gray-50 p-4 rounded-md text-center">
          <p class="text-gray-400 text-sm mb-2">Demo Credentials:</p>
          <p class="text-gray-800 font-medium">
            Username: <span class="font-bold">admin</span>
          </p>
          <p class="text-gray-800 font-medium">
            Password: <span class="font-bold">admin123</span>
          </p>
        </div>
      </div>
    </div>

    <script src="./logInScript.js"></script>
  </body>
</html>
